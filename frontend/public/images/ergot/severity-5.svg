  <line x1="60" y1="110" x2="60" y2="35" stroke="#5D4037" stroke-width="3"/>
  <!-- Panicle (severely affected) -->
  <ellipse cx="60" cy="45" rx="22" ry="30" fill="#DCEDC8" opacity="0.5"/>
  <ellipse cx="60" cy="45" rx="16" ry="24" fill="#F0F4C3" opacity="0.4"/>
  <!-- Massive honeydew covering -->
  <circle cx="48" cy="35" r="4.5" fill="#EF5350" opacity="0.8"/>
  <circle cx="60" cy="32" r="4" fill="#EF5350" opacity="0.8"/>
  <circle cx="70" cy="36" r="4.5" fill="#EF5350" opacity="0.8"/>
  <circle cx="50" cy="45" r="5" fill="#EF5350" opacity="0.8"/>
  <circle cx="62" cy="43" r="4.5" fill="#EF5350" opacity="0.8"/>
  <circle cx="72" cy="47" r="3.5" fill="#EF5350" opacity="0.8"/>
  <circle cx="48" cy="55" r="5" fill="#EF5350" opacity="0.8"/>
  <circle cx="60" cy="55" r="4.5" fill="#EF5350" opacity="0.8"/>
  <circle cx="68" cy="58" r="4" fill="#EF5350" opacity="0.8"/>
  <circle cx="55" cy="65" r="4" fill="#EF5350" opacity="0.8"/>
  <!-- Sclerotia (dark bodies) -->
  <ellipse cx="52" cy="50" rx="4" ry="2.5" fill="#3E2723" opacity="0.6"/>
  <ellipse cx="64" cy="55" rx="3.5" ry="2" fill="#3E2723" opacity="0.6"/>
