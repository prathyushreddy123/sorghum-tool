<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#FFF3E0"/>
  <!-- Stem -->
  <line x1="60" y1="110" x2="60" y2="35" stroke="#5D4037" stroke-width="3"/>
  <!-- Panicle -->
  <ellipse cx="60" cy="45" rx="22" ry="30" fill="#9CCC65" opacity="0.8"/>
  <ellipse cx="60" cy="45" rx="16" ry="24" fill="#AED581"/>
  <!-- Grain dots -->
  <circle cx="52" cy="35" r="2.5" fill="#7CB342"/>
  <circle cx="60" cy="30" r="2.5" fill="#7CB342"/>
  <circle cx="68" cy="35" r="2.5" fill="#7CB342"/>
  <circle cx="55" cy="45" r="2.5" fill="#7CB342"/>
  <circle cx="65" cy="45" r="2.5" fill="#7CB342"/>
  <circle cx="60" cy="55" r="2.5" fill="#7CB342"/>
  <!-- Honeydew droplets (moderate, spread) -->
  <circle cx="50" cy="42" r="3" fill="#FFB74D" opacity="0.85"/>
  <circle cx="68" cy="40" r="2.5" fill="#FFB74D" opacity="0.85"/>
  <circle cx="55" cy="55" r="3.5" fill="#FFB74D" opacity="0.85"/>
  <circle cx="65" cy="58" r="3" fill="#FFB74D" opacity="0.85"/>
  <circle cx="58" cy="48" r="2" fill="#FFB74D" opacity="0.85"/>
  <!-- Score label -->
  <text x="60" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#E65100">Score 3: Moderate</text>
</svg>
