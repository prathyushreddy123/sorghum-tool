<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="8" fill="#FBE9E7"/>
  <!-- Stem -->
  <line x1="60" y1="110" x2="60" y2="35" stroke="#5D4037" stroke-width="3"/>
  <!-- Panicle (yellowing) -->
  <ellipse cx="60" cy="45" rx="22" ry="30" fill="#C5E1A5" opacity="0.7"/>
  <ellipse cx="60" cy="45" rx="16" ry="24" fill="#DCEDC8"/>
  <!-- Grain dots (fewer visible) -->
  <circle cx="60" cy="30" r="2.5" fill="#9E9D24"/>
  <circle cx="52" cy="38" r="2.5" fill="#9E9D24"/>
  <circle cx="68" cy="38" r="2.5" fill="#9E9D24"/>
  <!-- Heavy honeydew -->
  <circle cx="48" cy="40" r="4" fill="#FF8A65" opacity="0.85"/>
  <circle cx="70" cy="38" r="3.5" fill="#FF8A65" opacity="0.85"/>
  <circle cx="52" cy="52" r="4" fill="#FF8A65" opacity="0.85"/>
  <circle cx="65" cy="50" r="3.5" fill="#FF8A65" opacity="0.85"/>
  <circle cx="56" cy="60" r="4" fill="#FF8A65" opacity="0.85"/>
  <circle cx="64" cy="62" r="3" fill="#FF8A65" opacity="0.85"/>
  <circle cx="60" cy="44" r="3" fill="#FF8A65" opacity="0.85"/>
  <!-- Mold patches -->
  <ellipse cx="55" cy="48" rx="5" ry="3" fill="#795548" opacity="0.3"/>
  <!-- Score label -->
  <text x="60" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#D84315">Score 4: High</text>
</svg>
